name: 🚀 Deploy to Server

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SERVER_KEY }}

      - name: Deploy Application
        run: |
          set -e

          BRANCH="${GITHUB_REF_NAME}"

          case "$BRANCH" in
            main)
              ENV="production"
              APP_NAME="jhs_timesnap_production"
              PORT=8011
              SMTP="${{ secrets.SMTP_KEY_PRODUCTION }}"
              ;;
            staging)
              ENV="staging"
              APP_NAME="jhs_timesnap_staging"
              PORT=8010
              SMTP="${{ secrets.SMTP_KEY_STAGING }}"
              ;;
            *)
              echo "❌ Unsupported branch: $BRANCH"
              exit 1
              ;;
          esac

          IMAGE="ghcr.io/jhsassociatesllp/jhs-timesnap:$ENV"

          echo "🌍 Environment: $ENV"
          echo "🐳 Image: $IMAGE"
          echo "📦 Container: $APP_NAME"
          echo "🔌 Port: $PORT"

          ssh -p "${{ secrets.SERVER_PORT }}" -o StrictHostKeyChecking=no \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << EOF
              set -e

              echo "🔐 Logging into GHCR..."
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

              echo "📥 Pulling latest image..."
              docker pull "$IMAGE"

              echo "🔍 Checking port ownership..."
              if docker ps --format "{{.Names}} {{.Ports}}" | grep ":$PORT->" | grep -v "$APP_NAME"; then
                echo "❌ Port $PORT is already used by another container"
                exit 1
              fi

              echo "🛑 Stopping existing container (if any)..."
              docker stop "$APP_NAME" || true
              docker rm "$APP_NAME" || true

              echo "▶️ Starting new container..."
              docker run -d \
                --name "$APP_NAME" \
                -p "$PORT:8000" \
                -e APP_ENV="$ENV" \
                -e MONGO_CONNECTION_STRING="${{ secrets.MONGO_CONNECTION_STRING }}" \
                -e SMTP_KEY="$SMTP" \
                -e JWT_SECRET="${{ secrets.JWT_SECRET_KEY }}" \
                "$IMAGE"

              echo "🧹 Cleaning dangling images..."
              docker image prune -f --filter "dangling=true"

              echo "✅ Deployment successful for $ENV"
          EOF