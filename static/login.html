<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — JHS</title>
    <link rel="icon" type="image/png" href="/static/jhs_logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --dark-bg: #2c3e50;
            --light-bg: #f8f9fa;
            --text-dark: #2c3e50;
            --border-color: #e1e8ed;
            --shadow-light: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-medium: 0 10px 25px rgba(0,0,0,0.15);
            --shadow-heavy: 0 20px 40px rgba(0,0,0,0.2);
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{
            font-family:'Inter',sans-serif;
            background:var(--primary-gradient);
            min-height:100vh;display:flex;justify-content:center;align-items:center;
            position:relative;overflow:hidden;padding:1rem;
        }
        body::before{
            content:'';position:absolute;inset:0;
            background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="50" cy="50" r="1" fill="white" opacity="0.05"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            opacity:.1;animation:float 20s ease-in-out infinite;
        }
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .login-container{
            background:white;padding:2.5rem 3rem;border-radius:20px;
            box-shadow:var(--shadow-heavy);width:100%;max-width:470px;
            text-align:center;position:relative;z-index:1;
            animation:fadeInUp .8s ease-out;
        }
        @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

        .login-logo{margin-bottom:.5rem}
        .login-logo img{height:52px;object-fit:contain}

        .login-container h2{
            margin:.5rem 0 .4rem;color:var(--text-dark);font-size:1.9rem;font-weight:300;
            display:flex;align-items:center;justify-content:center;gap:.6rem;
        }
        .login-container h2 i{color:#667eea}
        .login-subtitle{font-size:.85rem;color:#7f8c8d;margin-bottom:2rem}

        .form-group{margin-bottom:1.6rem;text-align:left;position:relative}
        .form-group label{display:block;font-weight:600;color:var(--text-dark);margin-bottom:.6rem;font-size:.92rem;text-transform:uppercase;letter-spacing:.5px}
        .form-group input{
            width:100%;padding:1rem 3.2rem;border:2px solid var(--border-color);
            border-radius:12px;font-size:1rem;transition:var(--transition);background:white;
        }
        .form-group input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1);transform:translateY(-1px)}
        .form-group i{position:absolute;top:2.6rem;color:#bdc3c7;z-index:1;transition:var(--transition)}
        .form-group i.fa-id-badge,.form-group i.fa-lock{left:1.1rem}
        .form-group i.fa-eye,.form-group i.fa-eye-slash{right:1.1rem;cursor:pointer}
        .form-group:focus-within i{color:#667eea}

        /* helper text under input */
        .input-hint{font-size:.75rem;color:#aaa;margin-top:.3rem;padding-left:.2rem}

        .login-btn{
            background:var(--success-gradient);color:white;border:none;
            padding:1rem 2.5rem;border-radius:12px;cursor:pointer;
            font-size:1.05rem;font-weight:600;width:100%;
            transition:var(--transition);box-shadow:var(--shadow-light);
            display:flex;align-items:center;justify-content:center;gap:.6rem;
            text-transform:uppercase;letter-spacing:.5px;margin-top:.5rem;
        }
        .login-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-medium)}
        .login-btn:active{transform:translateY(0)}

        .forgot-password{text-align:right;margin-top:-.8rem;margin-bottom:1rem}
        .forgot-password a{color:#667eea;text-decoration:none;font-size:.85rem;font-weight:500}
        .forgot-password a:hover{text-decoration:underline;color:#764ba2}

        .register-link{margin-top:1.4rem;font-size:.95rem;color:#7f8c8d}
        .register-link a{color:#667eea;text-decoration:none;font-weight:500}
        .register-link a:hover{text-decoration:underline;color:#764ba2}

        .message{
            margin:1.2rem 0;padding:.9rem 1rem;border-radius:10px;
            border-left:4px solid;display:none;font-weight:500;font-size:.95rem;text-align:left;
        }
        .error-message{color:#e74c3c;background:#fdf2f2;border-left-color:#e74c3c;animation:shake .5s}
        .success-message{color:#11998e;background:#e8f9f0;border-left-color:#11998e}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

        @media(max-width:480px){
            .login-container{padding:2rem 1.5rem;border-radius:15px}
            .login-container h2{font-size:1.6rem}
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <!-- If you have the logo at /static/jhs_logo.jpg, it shows here -->
            <!-- <img src="/static/jhs_logo.jpg" alt="JHS" onerror="this.style.display='none'" /> -->
        </div>
        <h2><i class="fas fa-sign-in-alt"></i> JHS Login</h2>
        <p class="login-subtitle">Timesnap &amp; Platform Portal</p>

        <div id="message" class="message"></div>

        <div class="form-group">
            <label>Employee Code or JHS Email</label>
            <i class="fas fa-id-badge"></i>
            <input type="text" id="empid" placeholder="e.g. JHS123 or name@jhs.com" autocomplete="username" />
            <div class="input-hint">Enter your Employee Code <strong>or</strong> your JHS email address</div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
            <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
        </div>

        <div class="forgot-password">
            <a href="/static/forgot_password.html"><i class="fas fa-key"></i> Forgot Password?</a>
        </div>

        <button class="login-btn" onclick="login()"><i class="fas fa-arrow-right"></i> Login</button>

        <div class="register-link">
            Don't have an account? <a href="/static/register.html">Register</a>
        </div>
    </div>

    <script>
        const API_URL = '';

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon  = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function login() {
            const raw      = document.getElementById('empid').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!raw || !password) {
                showMessage('Please enter your Employee Code (or Email) and Password', 'error');
                return;
            }

            const btn  = document.querySelector('.login-btn');
            const orig = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in…';
            btn.disabled  = true;

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: new URLSearchParams({ username: raw, password })
                });
                const result = await res.json();

                if (res.ok && result.success) {
                    localStorage.setItem('access_token',        result.access_token);
                    localStorage.setItem('loggedInEmployeeId',  result.employeeId);
                    localStorage.setItem('loggedInEmail',       result.email || '');
                    window.location.href = '/modules';
                } else {
                    showMessage(result.detail || 'Invalid credentials', 'error');
                }
            } catch (err) {
                showMessage('Failed to login: ' + err.message, 'error');
            } finally {
                btn.innerHTML = orig;
                btn.disabled  = false;
            }
        }

        function showMessage(message, type) {
            const div = document.getElementById('message');
            div.className = 'message ' + (type === 'success' ? 'success-message' : 'error-message');
            div.textContent = message;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 5000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('password').addEventListener('keypress', e => {
                if (e.key === 'Enter') login();
            });
            document.getElementById('empid').addEventListener('keypress', e => {
                if (e.key === 'Enter') document.getElementById('password').focus();
            });
        });
    </script>
</body>
</html>
