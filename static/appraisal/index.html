<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KRA — JHS</title>
  <link rel="icon" type="image/png" href="/static/jhs_logo.jpg"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <link rel="stylesheet" href="/static/appraisal/styles.css"/>
  <style>
    .role-badge{display:inline-block;padding:.25rem .75rem;border-radius:20px;font-size:.75rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-left:.5rem}
    .role-employee{background:#e3f2fd;color:#1565c0}.role-tl{background:#e8f5e9;color:#2e7d32}
    .role-partner{background:#fff3e0;color:#e65100}.role-admin{background:#fce4ec;color:#ad1457}
    .role-senior-partner{background:#ede7f6;color:#4527a0}

    .approval-table-wrap{overflow-x:auto;margin-top:1rem}
    .approval-table{width:100%;border-collapse:collapse;font-size:.9rem}
    .approval-table th{background:#1f3864;color:#fff;padding:.75rem 1rem;text-align:left;white-space:nowrap}
    .approval-table td{padding:.7rem 1rem;border-bottom:1px solid #e8ecf4;vertical-align:middle}
    .approval-table tr:hover td{background:#f5f8ff}
    .emp-code-link{color:#1565c0;font-weight:600;cursor:pointer;text-decoration:underline}

    .btn-approve{background:#27ae60;color:#fff;border:none;padding:.4rem .9rem;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s}
    .btn-reject{background:#e74c3c;color:#fff;border:none;padding:.4rem .9rem;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;margin-left:.4rem;transition:all .2s}
    .btn-view{background:#667eea;color:#fff;border:none;padding:.4rem .9rem;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;margin-left:.4rem;transition:all .2s}

    .pct-pill{display:inline-block;padding:.2rem .6rem;border-radius:12px;font-weight:600;font-size:.82rem}
    .pct-high{background:#d4edda;color:#155724}.pct-mid{background:#fff3cd;color:#856404}.pct-low{background:#f8d7da;color:#721c24}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:none;justify-content:center;align-items:flex-start;padding:2rem 1rem;overflow-y:auto}
    .modal-overlay.open{display:flex}
    .modal-box{background:#fff;border-radius:16px;width:100%;max-width:780px;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:fadeInUp .3s ease}
    .modal-header{padding:1.2rem 1.5rem;background:#1f3864;color:#fff;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center}
    .modal-header h3{font-size:1.05rem;font-weight:600;margin:0}
    .modal-close{background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer}
    .modal-body{padding:1.5rem;max-height:70vh;overflow-y:auto}
    .modal-footer{padding:1rem 1.5rem;border-top:1px solid #e8ecf4;display:flex;gap:.75rem;justify-content:flex-end;flex-wrap:wrap}

    .q-card{background:#f8faff;border:1px solid #e0e6f4;border-radius:10px;padding:1rem 1.2rem;margin-bottom:.9rem}
    .q-section-hdr{font-size:.75rem;text-transform:uppercase;letter-spacing:.6px;color:#888;font-weight:600;margin:.8rem 0 .5rem;padding-bottom:.3rem;border-bottom:1px solid #e8ecf4}
    .q-label{font-size:.9rem;color:#2c3e50;margin-bottom:.4rem;font-weight:500}
    .q-hint{font-size:.78rem;color:#999;margin-bottom:.4rem}
    .q-response{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
    .q-self-val{font-size:.82rem;background:#efefef;color:#555;padding:.2rem .6rem;border-radius:8px}
    .q-tl-val{font-size:.82rem;background:#d4edda;color:#155724;padding:.2rem .6rem;border-radius:8px}
    .q-pnd-val{font-size:.82rem;background:#fff3e0;color:#e65100;padding:.2rem .6rem;border-radius:8px}
    .star-btn{background:none;border:none;font-size:1.35rem;cursor:pointer;color:#ccc;padding:0;transition:color .15s}
    .star-btn.lit{color:#f39c12}
    .score-compare-strip{display:flex;gap:1rem;flex-wrap:wrap;background:#f0f4ff;border-radius:10px;padding:.9rem 1rem;margin-bottom:1rem;font-size:.85rem}
    .remarks-input{width:100%;padding:.5rem;border:1px solid #ccc;border-radius:8px;font-size:.88rem;margin-top:.4rem;resize:vertical}

    .section-divider{font-size:.9rem;font-weight:700;color:#1f3864;background:#eef2ff;padding:.5rem 1rem;border-radius:8px;margin:1rem 0 .5rem;display:flex;align-items:center;gap:.5rem}
    .count-badge{background:#1f3864;color:#fff;font-size:.75rem;padding:.15rem .5rem;border-radius:10px}

    /* Pipeline */
    .pipeline{display:flex;align-items:flex-start;margin:1.5rem 0;flex-wrap:wrap}
    .pipeline-step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:90px;position:relative}
    .pipeline-step:not(:last-child)::after{content:'';position:absolute;top:21px;left:50%;width:100%;height:3px;background:#e0e6f4;z-index:0}
    .pipeline-step.done::after,.pipeline-step.done~.pipeline-step.done::after{background:#27ae60}
    .pipeline-step.rejected::after{background:#e74c3c}
    .pipeline-dot{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;z-index:1;position:relative;border:3px solid #e0e6f4;background:#fff;transition:all .3s}
    .pipeline-step.done .pipeline-dot{background:#27ae60;border-color:#27ae60;color:#fff}
    .pipeline-step.active .pipeline-dot{background:#fff;border-color:#667eea;color:#667eea;animation:pulse 1.5s infinite}
    .pipeline-step.rejected .pipeline-dot{background:#e74c3c;border-color:#e74c3c;color:#fff}
    .pipeline-step.pending .pipeline-dot{background:#f5f5f5;border-color:#ddd;color:#bbb}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(102,126,234,.4)}50%{box-shadow:0 0 0 8px rgba(102,126,234,0)}}
    .pipeline-label{font-size:.78rem;font-weight:600;margin-top:.5rem;text-align:center;color:#444}
    .pipeline-actor{font-size:.7rem;color:#aaa;text-align:center;margin-top:.1rem}
    .pipeline-state-txt{font-size:.7rem;font-weight:700;text-align:center;margin-top:.15rem}
    .state-done{color:#27ae60}.state-active{color:#667eea}.state-rejected{color:#e74c3c}.state-pending{color:#bbb}

    .status-card{background:#fff;border-radius:12px;padding:1.3rem 1.5rem;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:1.2rem}
    .status-card h3{font-size:.95rem;font-weight:700;color:#1f3864;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
    .status-row{display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;border-bottom:1px solid #f5f5f5;font-size:.88rem}
    .status-row:last-child{border-bottom:none}
    .status-key{color:#888;font-weight:500}.status-val{color:#2c3e50;font-weight:600}
    .pill{display:inline-block;padding:.2rem .7rem;border-radius:20px;font-size:.78rem;font-weight:600}
    .pill-submitted{background:#cce5ff;color:#004085}.pill-draft{background:#fff3cd;color:#856404}
    .pill-pending{background:#f8d7da;color:#721c24}
    .pill-tlapproved{background:#d4edda;color:#155724}.pill-tlrejected{background:#f8d7da;color:#721c24}
    .pill-pndapproved{background:#d1ecf1;color:#0c5460}.pill-pndrejected{background:#f8d7da;color:#721c24}
    .pill-notstarted{background:#eee;color:#888}

    /* ── Analysis redesign ───────────────────────────────────────────────── */
    .an-loading{display:flex;align-items:center;gap:1rem;padding:3rem;color:#888;font-size:.95rem}
    .an-spinner{width:28px;height:28px;border:3px solid #e0e6f4;border-top-color:#667eea;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .an-error{padding:2rem;color:#e74c3c;font-size:.9rem}
    .an-wrap{padding:0}
    .an-empty{text-align:center;padding:2.5rem;color:#bbb;font-size:.9rem}
    .an-empty i{display:block;font-size:2rem;margin-bottom:.5rem}

    /* Tab bar */
    .an-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.5rem;background:#f5f7ff;border-radius:12px;padding:.4rem}
    .an-tab{display:flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.83rem;font-weight:600;border:none;background:transparent;color:#667;transition:all .2s}
    .an-tab.active{background:#1f3864;color:#fff;box-shadow:0 2px 8px rgba(31,56,100,.3)}
    .an-tab i{font-size:.8rem}

    /* Sections */
    .an-section{display:none}.an-section.active{display:block}

    /* KPI row */
    .an-kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:.9rem;margin-bottom:1.2rem}
    .an-kpi{background:#fff;border-radius:12px;padding:1rem 1.1rem;box-shadow:0 2px 8px rgba(0,0,0,.07);display:flex;gap:.8rem;align-items:flex-start}
    .an-kpi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .an-kpi-val{font-size:1.8rem;font-weight:700;color:#1f3864;line-height:1}
    .an-kpi-label{font-size:.75rem;font-weight:600;color:#555;margin-top:.15rem}
    .an-kpi-sub{font-size:.7rem;color:#aaa;margin-top:.1rem}

    /* Cards */
    .an-card{background:#fff;border-radius:12px;padding:1.2rem 1.4rem;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:1.1rem}
    .an-card-title{font-size:.9rem;font-weight:700;color:#1f3864;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
    .an-card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .an-card-hdr .an-card-title{margin-bottom:0}
    .an-two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.1rem}
    @media(max-width:700px){.an-two-col{grid-template-columns:1fr}}

    /* Score bars */
    .an-score-bar-wrap{margin-bottom:.7rem}
    .an-score-bar-label{display:flex;justify-content:space-between;font-size:.8rem;color:#555;margin-bottom:.25rem}
    .an-score-track{background:#f0f0f0;border-radius:6px;height:10px}
    .an-score-fill{height:100%;border-radius:6px;transition:width .6s ease}
    .an-lift-row{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.8rem;padding-top:.6rem;border-top:1px solid #f0f0f0}
    .an-lift{font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:.3rem}
    .an-lift.pos{color:#27ae60}.an-lift.neg{color:#e74c3c}

    /* Insights */
    .an-insight{display:flex;align-items:flex-start;gap:.6rem;padding:.55rem 0;border-bottom:1px solid #f5f5f5;font-size:.84rem;color:#444;line-height:1.5}
    .an-insight:last-child{border-bottom:none}
    .an-insight i{margin-top:.15rem;font-size:.9rem;flex-shrink:0}

    /* Tables */
    .an-table-wrap{overflow-x:auto}
    .an-table{width:100%;border-collapse:collapse;font-size:.85rem}
    .an-table th{background:#1f3864;color:#fff;padding:.65rem .9rem;text-align:left;white-space:nowrap;font-weight:600}
    .an-table td{padding:.6rem .9rem;border-bottom:1px solid #f0f4ff;vertical-align:middle}
    .an-table tbody tr:hover td{background:#f8faff}
    .an-num{text-align:right}
    .clickable-col{cursor:help}
    .an-num-btn{display:inline-block;min-width:28px;padding:.15rem .5rem;border-radius:8px;font-weight:700;cursor:pointer;text-align:center;background:#eef2ff;color:#1f3864;transition:all .15s;font-size:.83rem}
    .an-num-btn:hover{background:#1f3864;color:#fff}
    .an-num-btn.pending{background:#fff3cd;color:#856404}.an-num-btn.pending:hover{background:#f39c12;color:#fff}
    .an-num-btn.approved,.an-num-btn.pnd-approved{background:#d4edda;color:#155724}.an-num-btn.approved:hover,.an-num-btn.pnd-approved:hover{background:#27ae60;color:#fff}
    .an-num-btn.rejected,.an-num-btn.pnd-rejected{background:#f8d7da;color:#721c24}.an-num-btn.rejected:hover,.an-num-btn.pnd-rejected:hover{background:#e74c3c;color:#fff}

    /* Designation bars */
    .an-desig-grid{display:flex;flex-direction:column;gap:.4rem}
    .an-desig-item{display:flex;align-items:center;gap:.7rem;font-size:.82rem}
    .an-desig-label{min-width:180px;color:#555;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .an-desig-bar-wrap{flex:1;background:#f0f0f0;border-radius:6px;height:14px}
    .an-desig-bar{height:100%;border-radius:6px;transition:width .5s}
    .an-desig-count{min-width:30px;font-weight:700;color:#1f3864;text-align:right}

    /* Mini bar in partner table */
    .an-mini-bar-wrap{display:flex;align-items:center;gap:.4rem;justify-content:flex-end}
    .an-mini-bar-wrap>span{font-size:.78rem;font-weight:600;color:#555;min-width:32px}
    .an-mini-bar-wrap .an-mini-bar{height:8px;background:#27ae60;border-radius:4px;min-width:4px;max-width:80px}

    /* Funnel */
    .an-funnel{display:flex;flex-direction:column;gap:.5rem;margin-top:.5rem}
    .an-funnel-step{}
    .an-funnel-bar{display:flex;justify-content:space-between;align-items:center;padding:.5rem .8rem;border-radius:8px;font-size:.84rem}

    /* Status chips */
    .an-status-chip{display:inline-block;padding:.15rem .6rem;border-radius:10px;font-size:.75rem;font-weight:600}
    .an-status-submitted{background:#cce5ff;color:#004085}
    .an-status-draft{background:#fff3cd;color:#856404}
    .an-status-tl-approved{background:#d4edda;color:#155724}
    .an-status-tl-rejected{background:#f8d7da;color:#721c24}
    .an-status-pnd-approved{background:#d1ecf1;color:#0c5460}
    .an-status-pnd-rejected{background:#f8d7da;color:#721c24}

    /* Export button */
    .an-export-btn{display:flex;align-items:center;gap:.3rem;background:#eef2ff;color:#1f3864;border:none;padding:.4rem .9rem;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .2s;white-space:nowrap}
    .an-export-btn:hover{background:#1f3864;color:#fff}

    /* Search */
    .an-filter-row{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}
    .an-filter-select{padding:.5rem .7rem;border:1.5px solid #e0e6f4;border-radius:10px;font-size:.82rem;outline:none;background:#fff;color:#555;cursor:pointer;min-width:130px;transition:border .2s}
    .an-filter-select:focus{border-color:#667eea}
    .an-search-wrap{position:relative;display:flex;align-items:center;min-width:200px}
    .an-search-icon{position:absolute;left:.8rem;color:#aaa;font-size:.9rem}
    .an-search-input{width:100%;padding:.55rem .9rem .55rem 2.2rem;border:1.5px solid #e0e6f4;border-radius:10px;font-size:.88rem;outline:none;transition:border .2s}
    .an-search-input:focus{border-color:#667eea}
    .an-result-count{white-space:nowrap;font-size:.8rem;color:#888;font-weight:500}
    .an-emp-link{color:#1565c0;cursor:pointer;font-weight:600;text-decoration:underline;text-underline-offset:2px}
    .an-emp-link:hover{color:#0d47a1}

    /* Pagination */
    .an-pagination{display:flex;justify-content:center;align-items:center;gap:.3rem;margin-top:1rem;flex-wrap:wrap}
    .an-pg-btn{padding:.35rem .65rem;border:1.5px solid #e0e6f4;border-radius:7px;background:#fff;color:#555;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .2s;min-width:32px}
    .an-pg-btn:hover:not(:disabled){background:#1f3864;color:#fff;border-color:#1f3864}
    .an-pg-btn.active{background:#1f3864;color:#fff;border-color:#1f3864}
    .an-pg-btn:disabled{opacity:.4;cursor:not-allowed}
    .an-pg-ellipsis{color:#aaa;padding:0 .3rem}

    /* Analysis drill-down modal */
    .an-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:none;justify-content:center;align-items:flex-start;padding:2rem 1rem;overflow-y:auto}
    .an-modal-box{background:#fff;border-radius:16px;width:100%;max-width:860px;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:fadeInUp .25s ease}
    .an-modal-header{padding:1rem 1.4rem;background:#1f3864;color:#fff;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center}
    .an-modal-header h3{font-size:1rem;font-weight:600;margin:0}
    .an-modal-close{background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;line-height:1}
    .an-modal-body{padding:1.2rem 1.4rem;max-height:70vh;overflow-y:auto}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<nav class="navbar">
  <div class="hamburger" onclick="toggleNav()"><i class="fas fa-bars"></i></div>
  <div class="nav-menu" id="navMenu"></div>
</nav>

<div class="container">
  <div class="header">
    <h1><i class="fas fa-chart-line"></i> JHS KRA <span id="roleBadge" class="role-badge"></span></h1>
    <p id="headerSub">Annual Performance Review</p>
  </div>
  <div id="tabContents"></div>
</div>

<div class="loading-bar" id="loadingBar"><i class="fas fa-spinner fa-spin"></i> Loading…</div>
<div class="popup" id="popup"><p id="popupMsg"></p><button class="popup-close" onclick="closePopup()">&times;</button></div>
<div class="exit-confirmation" id="logoutConfirm">
  <p>Do you want to logout?</p>
  <button class="confirm-btn" onclick="doLogout()">Yes</button>
  <button class="cancel-btn" onclick="document.getElementById('logoutConfirm').style.display='none'">No</button>
</div>

<div class="modal-overlay" id="kraModal">
  <div class="modal-box">
    <div class="modal-header"><h3 id="modalTitle">KRA Review</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script src="/static/appraisal/script.js"></script>
<script>
const API = "", EID = localStorage.getItem("loggedInEmployeeId")||"", TOK = localStorage.getItem("access_token")||"";
if (!TOK) window.location.href = "/static/login.html";
const H = () => ({"Content-Type":"application/json",Authorization:`Bearer ${TOK}`});

// ── Global state ──────────────────────────────────────────────────────────────
let _role    = "employee";  // natural role: employee | tl | partner | admin
let _isAdmin = false;       // true if user is in admin list (regardless of natural role)
let _period  = "";
let _modalRecord = null, _editMode = false, _editedAnswers = {};
const _loaded = new Set();

// ── Boot ──────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", async () => {
  showLoading("Initialising…");
  try {
    const sv = await fetch(`${API}/verify_session`,{method:"POST",headers:H()});
    if (!sv.ok) throw new Error("Session invalid");

    const [rr, pr] = await Promise.all([
      fetch(`${API}/appraisal/my_role`,{headers:H()}),
      fetch(`${API}/appraisal/period`,{headers:H()}),
    ]);
    const rd = await rr.json(), pd = await pr.json();

    _role    = rd.role    || "employee";
    _isAdmin = rd.isAdmin || false;   // ← comes from backend now
    _period  = pd.period  || "";

    document.getElementById("headerSub").textContent = `Annual Performance Review — ${_period}`;
    _renderRoleBadge();
    _buildNav();
    _buildTabContents();
  } catch(e) {
    showPopup("Session error — please login again.", true);
    setTimeout(() => window.location.href = "/static/login.html", 2000);
  } finally {
    hideLoading();
  }
});

// ── Role badge ────────────────────────────────────────────────────────────────
function _renderRoleBadge() {
  const el = document.getElementById("roleBadge");

  // Special label for admin+partner (senior partner)
  if (_role === "partner" && _isAdmin) {
    el.textContent = "Senior Partner";
    el.className   = "role-badge role-senior-partner";
    return;
  }
  if (_role === "admin" && _isAdmin) {
    el.textContent = "Admin";
    el.className   = "role-badge role-admin";
    return;
  }

  const labelMap = {employee:"Employee", tl:"TL / Manager", partner:"Partner & Director", admin:"Admin"};
  const clsMap   = {employee:"role-employee", tl:"role-tl", partner:"role-partner", admin:"role-admin"};
  el.textContent = labelMap[_role] || _role;
  el.className   = `role-badge ${clsMap[_role] || ""}`;
}

// ── Nav builder ───────────────────────────────────────────────────────────────
/*
  Nav logic by role + isAdmin:

  employee            → Form, History, Status
  tl                  → Form, History, Status, Pending, Approved, Rejected
  partner (not admin) → Pending, Approved, Rejected, Analysis
  partner + isAdmin   → Form, History, Status, Pending, Approved, Rejected, Analysis
  admin (pure)        → Form, History, Status, Analysis, All-Pending, All-Approved, All-Rejected
*/
function _buildNav() {
  const menu  = document.getElementById("navMenu");
  const links = [];

  // ── Own KRA tabs (Form / History / Status) ──
  // Show for: employee, tl, pure admin, AND admin+partner (senior partner)
  const showOwnKRA = (_role !== "partner") || _isAdmin;
  if (showOwnKRA) {
    links.push(
      `<a href="#" onclick="showSection('form')"    id="nt_form"   ><i class="fas fa-file-alt"></i> Form</a>`,
      `<a href="#" onclick="showSection('history')" id="nt_history"><i class="fas fa-history"></i> History</a>`,
      `<a href="#" onclick="showSection('status')"  id="nt_status" ><i class="fas fa-info-circle"></i> Status</a>`,
    );
  }

// ── Section switching ─────────────────────────────────────────────────────────
function showSection(name) {
  document.querySelectorAll(".tab-content").forEach(e => {
    e.style.display = "none"; e.classList.remove("active");
  });
  document.querySelectorAll(".nav-menu a").forEach(a => a.classList.remove("active"));

  const sec = document.getElementById("sec_" + name);
  if (sec) { sec.style.display = "block"; sec.classList.add("active"); }
  document.getElementById("nt_" + name)?.classList.add("active");
  document.getElementById("navMenu")?.classList.remove("active");
  _loadSection(name);
}

async function _loadSection(name) {
  if (_loaded.has(name)) return;
  _loaded.add(name);
  const m = {
    history:      loadStatusHistory,
    status:       loadStatusDetail,
    tl_pending:   () => _loadList("tl/pending",   "tl_pending_content",   "tl_pending"),
    tl_approved:  () => _loadList("tl/approved",  "tl_approved_content",  "tl_approved"),
    tl_rejected:  () => _loadList("tl/rejected",  "tl_rejected_content",  "tl_rejected"),
    pnd_pending:  loadPNDPending,
    pnd_approved: loadPNDApproved,
    pnd_rejected: loadPNDRejected,
    admin_pending:  () => _loadList("admin/pending",  "admin_pending_content",  "admin_pending"),
    admin_approved: () => _loadList("admin/approved", "admin_approved_content", "admin_approved"),
    admin_rejected: () => _loadList("admin/rejected", "admin_rejected_content", "admin_rejected"),
    analysis: loadAnalysis,
  };
  if (m[name]) await m[name]();
}

// ── Generic list loader ───────────────────────────────────────────────────────
async function _loadList(endpoint, elId, context) {
  const el = document.getElementById(elId);
  el.innerHTML = `<p class="empty-msg"><i class="fas fa-spinner fa-spin"></i></p>`;
  try {
    const d = await (await fetch(`${API}/appraisal/${endpoint}`, {headers:H()})).json();
    const rows = d.data || [];
    el.innerHTML = rows.length
      ? _buildApprovalTable(rows, context)
      : `<div class="empty-state"><i class="fas fa-inbox"></i>No records</div>`;
  } catch {
    el.innerHTML = `<p class="empty-msg">Failed to load.</p>`;
  }
}

// ── Status detail tab ─────────────────────────────────────────────────────────
async function loadStatusDetail() {
  const el = document.getElementById("statusContent");
  el.innerHTML = `<p class="empty-msg"><i class="fas fa-spinner fa-spin"></i></p>`;
  try {
    const [eligR, detR] = await Promise.all([
      fetch(`${API}/appraisal/eligibility/${EID}`, {headers:H()}),
      fetch(`${API}/appraisal/my_status_detail/${EID}`, {headers:H()}),
    ]);
    const elig = await eligR.json(), det = await detR.json();
    let html = "";

    html += `<div class="status-card"><h3><i class="fas fa-user-check"></i> Eligibility</h3>
      <div class="status-row"><span class="status-key">Status</span>
        <span class="status-val"><span class="pill ${elig.eligible?"pill-submitted":"pill-pending"}">${elig.eligible?"Eligible":"Not Eligible"}</span></span></div>
      ${elig.doj?`<div class="status-row"><span class="status-key">Date of Joining</span><span class="status-val">${elig.doj}</span></div>`:""}
      ${elig.reason?`<div class="status-row"><span class="status-key">Note</span><span class="status-val" style="font-weight:400;color:#888">${elig.reason}</span></div>`:""}
    </div>`;

    const s = det.status || "not_started";
    const slabel = {not_started:"Not Started",draft:"Draft Saved",submitted:"Submitted",TL_approved:"TL Approved",TL_rejected:"TL Rejected",PnD_approved:"PnD Approved",PnD_rejected:"PnD Rejected"}[s] || s;
    const pcls = "pill-" + (s.toLowerCase().replace(/_/g,"")) || "pill-notstarted";

    html += `<div class="status-card"><h3><i class="fas fa-paper-plane"></i> KRA — ${det.period}</h3>
      <div class="status-row"><span class="status-key">Current Status</span><span class="status-val"><span class="pill ${pcls}">${slabel}</span></span></div>
      <div class="status-row"><span class="status-key">Last Updated</span><span class="status-val">${det.updatedAt?new Date(det.updatedAt).toLocaleString("en-IN"):"—"}</span></div>
      ${det.selfPercentage!=null?`<div class="status-row"><span class="status-key">Your Score</span><span class="status-val">${_pctPill(det.selfPercentage)}</span></div>`:""}
      ${det.tlPercentage !=null?`<div class="status-row"><span class="status-key">TL Score</span><span class="status-val">${_pctPill(det.tlPercentage)}</span></div>`:""}
      ${det.pndPercentage!=null?`<div class="status-row"><span class="status-key">Partner Score</span><span class="status-val">${_pctPill(det.pndPercentage)}</span></div>`:""}
      ${det.tlRemarks ?`<div class="status-row"><span class="status-key">TL Remarks</span><span class="status-val" style="font-weight:400">${det.tlRemarks}</span></div>`:""}
      ${det.pndRemarks?`<div class="status-row"><span class="status-key">Partner Remarks</span><span class="status-val" style="font-weight:400">${det.pndRemarks}</span></div>`:""}
    </div>`;

    if (det.levels?.length) {
      const icons     = {done:"fa-check", active:"fa-clock", rejected:"fa-times", pending:"fa-ellipsis-h"};
      const stateText = {done:"Approved", active:"In Progress", rejected:"Rejected", pending:"Pending"};
      html += `<div class="status-card"><h3><i class="fas fa-sitemap"></i> Approval Pipeline</h3><div class="pipeline">`;
      det.levels.forEach(lv => {
        html += `<div class="pipeline-step ${lv.state}">
          <div class="pipeline-dot"><i class="fas ${icons[lv.state]||"fa-ellipsis-h"}"></i></div>
          <div class="pipeline-label">${lv.label}</div>
          <div class="pipeline-actor">${lv.actor}</div>
          <div class="pipeline-state-txt state-${lv.state}">${stateText[lv.state]||""}</div>
        </div>`;
      });
      html += `</div></div>`;
    }
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<p class="empty-msg">Failed: ${e.message}</p>`;
  }
}

// ── History tab ───────────────────────────────────────────────────────────────
async function loadStatusHistory() {
  const el = document.getElementById("historyContent");
  el.innerHTML = `<p class="empty-msg"><i class="fas fa-spinner fa-spin"></i></p>`;
  try {
    const r = await fetch(`${API}/appraisal/my/${EID}`, {headers:H()});
    const d = await r.json();
    if (!d.success || !d.data?.length) { el.innerHTML = `<p class="empty-msg">No KRA records found.</p>`; return; }
    const records = [...d.data].sort((a,b) => (b.updatedAt||"").localeCompare(a.updatedAt||""));
    el.innerHTML = "";
    records.forEach(rec => el.appendChild(_buildHistoryCard(rec)));
  } catch {
    el.innerHTML = `<p class="empty-msg">Failed to load history.</p>`;
  }
}

function _buildHistoryCard(rec) {
  const card = document.createElement("div");
  card.className = `history-card ${rec.status}`;
  const isSubmitted = rec.status === "submitted";
  const updatedStr  = rec.updatedAt
    ? new Date(rec.updatedAt).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})
    : "—";
  card.innerHTML = `
    <div class="history-card-header">
      <span class="history-period"><i class="fas fa-calendar-alt"></i> ${rec.period||"—"}</span>
      <span class="history-badge ${isSubmitted?"badge-submitted":"badge-draft"}">${isSubmitted?"Submitted":"Draft"}</span>
    </div>
    <div class="history-meta">Designation: <strong>${rec.designation||"—"}</strong> &nbsp;|&nbsp; Last updated: <strong>${updatedStr}</strong></div>
    <div class="history-answers" id="ha_${rec.id}">
      <button onclick="toggleAnswers('${rec.id}')" style="background:none;border:1px solid var(--border-color);padding:.4rem 1rem;border-radius:8px;cursor:pointer;font-size:.85rem;color:var(--text-light);margin-top:.5rem">
        <i class="fas fa-chevron-down"></i> View Answers
      </button>
      <div id="ha_body_${rec.id}" style="display:none;margin-top:1rem;"></div>
    </div>`;
  return card;
}

function toggleAnswers(rid) {
  const body = document.getElementById("ha_body_" + rid);
  if (!body) return;
  if (body.style.display === "none") { body.style.display = "block"; _populateAnswerView(rid, body); }
  else body.style.display = "none";
}

async function _populateAnswerView(rid, container) {
  if (container.innerHTML.trim() !== "") return;
  try {
    const r = await fetch(`${API}/appraisal/my/${EID}`, {headers:H()});
    const d = await r.json();
    const rec = d.data?.find(r => r.id === rid);
    if (!rec || !rec.answers) { container.textContent = "No answers found."; return; }
    if (!window._questions) {
      const qr = await fetch(`${API}/appraisal/questions/${EID}`, {headers:H()});
      window._questions = await qr.json();
    }
    const allQs = [...(window._questions.common||[]), ...(window._questions.role||[])];
    const groups = {};
    allQs.forEach(q => { const s = q.section||"General"; if (!groups[s]) groups[s]=[]; groups[s].push(q); });
    Object.entries(groups).forEach(([section, qs]) => {
      const secDiv = document.createElement("div"); secDiv.className = "ha-section";
      secDiv.innerHTML = `<div class="ha-section-title">${section}</div>`;
      qs.forEach(q => {
        const ans = rec.answers[q.id];
        if (ans === undefined || ans === null || ans === "") return;
        const row = document.createElement("div"); row.className = "ha-row";
        const displayAns = q.type === "rating" ? `${ans}/5 ★` : String(ans);
        row.innerHTML = `<div class="ha-q">${q.question}</div><div class="ha-a">${displayAns}</div>`;
        secDiv.appendChild(row);
      });
      container.appendChild(secDiv);
    });
  } catch { container.textContent = "Failed to load answers."; }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function _pctPill(v) {
  if (v == null) return "—";
  const cls = v >= 75 ? "pct-high" : v >= 50 ? "pct-mid" : "pct-low";
  return `<span class="pct-pill ${cls}">${v}%</span>`;
}
function _statusLabel(s) {
  return {submitted:"Submitted",draft:"Draft",TL_approved:"TL Approved",TL_rejected:"TL Rejected",PnD_approved:"PnD Approved",PnD_rejected:"PnD Rejected"}[s] || s;
}
function _fmt(iso) {
  return iso ? new Date(iso).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}) : "—";
}

// ── Approval table ────────────────────────────────────────────────────────────
function _buildApprovalTable(rows, context) {
  const noTL   = ["tl_pending","pnd_pending_tl","admin_pending"].includes(context);
  const showPND = ["pnd_approved","pnd_rejected","admin_approved","admin_rejected"].includes(context);
  let html = `<div class="approval-table-wrap"><table class="approval-table"><thead><tr>
    <th>#</th><th>Emp Code</th><th>Name</th><th>Designation</th><th>Self %</th>
    ${noTL?"":"<th>TL %</th>"}${showPND?"<th>PnD %</th>":""}
    <th>Status</th><th>Updated</th><th>Actions</th>
  </tr></thead><tbody>`;
  rows.forEach((r, i) => {
    html += `<tr>
      <td>${i+1}</td>
      <td><span class="emp-code-link" onclick="openModal('${r.id}','${context}')">${r.employeeId}</span></td>
      <td>${r.employeeName||"—"}</td>
      <td><small>${r.designation||"—"}</small></td>
      <td>${_pctPill(r.selfPercentage)}</td>
      ${noTL ? "" : `<td>${_pctPill(r.tlPercentage)}</td>`}
      ${showPND ? `<td>${_pctPill(r.pndPercentage)}</td>` : ""}
      <td><small>${_statusLabel(r.status)}</small></td>
      <td><small>${_fmt(r.updatedAt)}</small></td>
      <td>${_buildActions(r, context)}</td>
    </tr>`;
  });
  return html + `</tbody></table></div>`;
}

function _buildActions(r, ctx) {
  const id = r.id;
  if (ctx === "tl_pending")     return `<button class="btn-approve" onclick="tlAction('${id}','approve')">Approve</button><button class="btn-reject" onclick="tlAction('${id}','reject')">Reject</button>`;
  if (ctx === "tl_approved")    return `<button class="btn-view" onclick="openModal('${id}','tl_approved')">View</button><button class="btn-reject" onclick="tlAction('${id}','reject')">Reject</button>`;
  if (ctx === "tl_rejected")    return `<button class="btn-approve" onclick="openModal('${id}','tl_rejected_edit')">Review & Approve</button>`;
  if (ctx === "pnd_pending_emp"||ctx === "pnd_pending_tl") return `<button class="btn-approve" onclick="openModal('${id}','pnd_edit')">Review & Approve</button><button class="btn-reject" onclick="pndAction('${id}','reject')">Reject</button>`;
  if (ctx === "pnd_approved")   return `<button class="btn-view" onclick="openModal('${id}','pnd_view')">View</button><button class="btn-reject" onclick="pndAction('${id}','reject')">Reject</button>`;
  if (ctx === "pnd_rejected")   return `<button class="btn-approve" onclick="openModal('${id}','pnd_edit')">Review & Approve</button>`;
  return `<button class="btn-view" onclick="openModal('${id}','admin_view')">View</button>`;
}

// ── Quick actions ─────────────────────────────────────────────────────────────
async function tlAction(rid, action) {
  if (!confirm(`${action==="approve"?"Approve":"Reject"} this KRA?`)) return;
  try {
    showLoading("Processing…");
    const r = await fetch(`${API}/appraisal/tl/action/${rid}`,{method:"POST",headers:H(),body:JSON.stringify({action,tl_responses:null,remarks:""})});
    const d = await r.json();
    if (!d.success) throw new Error(d.detail||"Failed");
    showPopup(d.message);
    ["tl_pending","tl_approved","tl_rejected"].forEach(k => _loaded.delete(k));
    const sec = document.querySelector(".tab-content.active");
    if (sec) { const n = sec.id.replace("sec_",""); _loaded.delete(n); _loadSection(n); }

async function pndAction(rid, action, responses) {
  if (!confirm(`${action==="approve"?"Approve":"Reject"} this KRA?`)) return;
  try {
    showLoading("Processing…");
    const body = {action};
    if (responses) body.pnd_responses = responses;
    const r = await fetch(`${API}/appraisal/pnd/action/${rid}`,{method:"POST",headers:H(),body:JSON.stringify(body)});
    const d = await r.json();
    if (!d.success) throw new Error(d.detail||"Failed");

// ── Modal ─────────────────────────────────────────────────────────────────────
async function openModal(rid, ctx) {
  showLoading("Loading KRA…");
  try {
    const ep = (ctx.startsWith("pnd") || ctx === "admin_view")
      ? `${API}/appraisal/pnd/record/${rid}`
      : `${API}/appraisal/tl/record/${rid}`;
    const r = await fetch(ep, {headers:H()}); const d = await r.json();
    if (!d.success) throw new Error(d.detail||"Failed");
    _modalRecord = d.data;
    _editMode    = ["tl_pending","tl_rejected_edit","pnd_edit"].includes(ctx);
    _editedAnswers = {};
    if (_editMode) {
      const base = ctx.startsWith("pnd")
        ? (_modalRecord.pnd_responses || _modalRecord.tl_responses || _modalRecord.answers || {})
        : (_modalRecord.tl_responses  || _modalRecord.answers || {});
      _editedAnswers = {...base};
    }
    document.getElementById("modalTitle").textContent = `${_modalRecord.employeeName||_modalRecord.employeeId} — KRA Review`;
    _renderModalBody(ctx);
    _renderModalFooter(ctx, rid);
    document.getElementById("kraModal").classList.add("open");
  } catch(e) { showPopup(e.message, true); } finally { hideLoading(); }
}

function closeModal() {
  document.getElementById("kraModal").classList.remove("open");
  _modalRecord = null; _editedAnswers = {};
}

function _renderModalBody(ctx) {
  const rec  = _modalRecord, qs = rec.questions, allQ = [...(qs.common||[]),...(qs.role||[])];
  const selfA = rec.answers||{}, tlA = rec.tl_responses||{}, pndA = rec.pnd_responses||{};
  const isPnd = ctx.startsWith("pnd");
  const selfPct = rec.selfPercentage ?? rec.percentage;
  let html = `<div class="score-compare-strip">
    <span><i class="fas fa-user" style="color:#667eea"></i> <strong>Self:</strong> ${selfPct??"—"}%</span>
    ${rec.tlPercentage !=null?`<span><i class="fas fa-user-tie" style="color:#27ae60"></i> <strong>TL:</strong> ${rec.tlPercentage}%</span>`:""}
    ${rec.pndPercentage!=null?`<span><i class="fas fa-crown" style="color:#e65100"></i> <strong>PnD:</strong> ${rec.pndPercentage}%</span>`:""}
  </div>`;
  if (_editMode) html += `<div style="margin-bottom:1rem"><label style="font-size:.85rem;font-weight:600;color:#555">Remarks (optional)</label><textarea id="modalRemarks" class="remarks-input" rows="2" placeholder="Add remarks…"></textarea></div>`;
  const sections = {};
  allQ.forEach(q => { const s = q.section||"General"; if (!sections[s]) sections[s]=[]; sections[s].push(q); });
  Object.entries(sections).forEach(([sec, qs]) => {
    html += `<div class="q-section-hdr">${sec}</div>`;
    qs.forEach(q => {
      const sv = selfA[q.id], tv = tlA[q.id], pv = pndA[q.id];
      const wv = _editMode ? (isPnd ? (pv??tv??sv) : (tv??sv)) : sv;
      html += `<div class="q-card"><div class="q-label">${q.question}</div><div class="q-hint">${q.response_hint||""}</div><div class="q-response">
        <span class="q-self-val">👤 Self: ${_dispVal(q,sv)}</span>
        ${tv!=null&&ctx!=="tl_pending"?`<span class="q-tl-val">🏷 TL: ${_dispVal(q,tv)}</span>`:""}
        ${pv!=null&&isPnd&&!_editMode?`<span class="q-pnd-val">👑 PnD: ${_dispVal(q,pv)}</span>`:""}
        ${_editMode ? _editInput(q, wv) : ""}
      </div></div>`;
    });
  });
  document.getElementById("modalBody").innerHTML = html;
  if (_editMode) allQ.filter(q => q.type==="rating").forEach(q => _updateStars(q.id, parseInt(_editedAnswers[q.id])||0));
}

function _dispVal(q, v) { if (v==null||v==="") return "—"; return q.type==="rating"?`${v}/5 ★`:String(v); }

function _editInput(q, cv) {
  const id = q.id;
  if (q.type==="rating") { let s=""; for(let i=1;i<=5;i++) s+=`<button class="star-btn" id="star_${id}_${i}" onclick="setStar('${id}',${i})">★</button>`; return `<div style="display:flex;gap:.3rem">${s}</div>`; }
  if (q.type==="number") return `<input type="number" min="0" value="${cv??""}" id="edit_${id}" onchange="_editedAnswers['${id}']=this.value" style="width:85px;padding:.35rem .6rem;border:1px solid #ccc;border-radius:8px;font-size:.9rem"/>`;
  if (q.type==="yes_no") return `<select id="edit_${id}" onchange="_editedAnswers['${id}']=this.value" style="padding:.35rem .6rem;border:1px solid #ccc;border-radius:8px;font-size:.9rem"><option value="">—</option><option value="Yes" ${cv==="Yes"?"selected":""}>Yes</option><option value="No" ${cv==="No"?"selected":""}>No</option></select>`;
  if (q.type==="yes_no_number") { const p=String(cv||"").split("|"); return `<select id="edit_yn_${id}" onchange="updateYNNum('${id}')" style="padding:.35rem;border:1px solid #ccc;border-radius:8px;font-size:.9rem"><option value="">—</option><option value="Yes" ${p[0]==="Yes"?"selected":""}>Yes</option><option value="No" ${p[0]==="No"?"selected":""}>No</option></select><input type="number" min="0" id="edit_num_${id}" value="${p[1]||""}" onchange="updateYNNum('${id}')" style="width:65px;padding:.35rem;border:1px solid #ccc;border-radius:8px;font-size:.9rem"/>`; }
  return `<textarea id="edit_${id}" rows="2" style="width:100%;padding:.4rem;border:1px solid #ccc;border-radius:8px;font-size:.85rem;resize:vertical" onchange="_editedAnswers['${id}']=this.value">${cv||""}</textarea>`;
}

function setStar(id, v) { _editedAnswers[id]=v; _updateStars(id, v); }
function _updateStars(id, v) { for(let i=1;i<=5;i++) { const s=document.getElementById(`star_${id}_${i}`); if(s) s.classList.toggle("lit", i<=v); } }
function updateYNNum(id) { _editedAnswers[id]=`${document.getElementById(`edit_yn_${id}`)?.value||""}|${document.getElementById(`edit_num_${id}`)?.value||""}`; }

function _renderModalFooter(ctx, rid) {
  let html = `<button onclick="closeModal()" style="padding:.5rem 1.2rem;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fff">Close</button>`;
  if (ctx==="tl_pending")      html += `<button class="btn-reject" onclick="modalTLAction('${rid}','reject')">Reject</button><button class="btn-approve" onclick="modalTLAction('${rid}','approve')">Save & Approve</button>`;
  if (ctx==="tl_rejected_edit") html += `<button class="btn-approve" onclick="modalTLAction('${rid}','approve')">Save & Approve</button>`;
  if (ctx==="pnd_edit")        html += `<button class="btn-reject" onclick="modalPNDAction('${rid}','reject')">Reject</button><button class="btn-approve" onclick="modalPNDAction('${rid}','approve')">Save & Approve</button>`;
  if (ctx==="pnd_approved"||ctx==="pnd_view") html += `<button class="btn-reject" onclick="pndAction('${rid}','reject');closeModal()">Move to Rejected</button>`;
  if (ctx==="tl_approved") html += `<button class="btn-reject" onclick="tlAction('${rid}','reject');closeModal()">Move to Rejected</button>`;
  document.getElementById("modalFooter").innerHTML = html;
}

}

// ── Analysis ──────────────────────────────────────────────────────────────────
// New full analysis engine — tabbed, with insights, pagination, export, data tab

let _analysisData    = null;
let _dataSearchQuery = "";
let _dataCurrentPage = 1;
const DATA_PAGE_SIZE = 10;

async function loadAnalysis() {
  const el = document.getElementById("analysis_content");
  el.innerHTML = `<div class="an-loading"><div class="an-spinner"></div><span>Loading analysis…</span></div>`;
  try {
    const r = await fetch(`${API}/appraisal/analysis`, {headers:H()});
    const d = await r.json();
    if (!d.success) throw new Error(d.detail || "Failed");
    _analysisData = d;
    el.innerHTML  = _buildAnalysis(d);
    window._dataRows = _buildDataRows();
  } catch(e) {
    el.innerHTML = `<div class="an-error"><i class="fas fa-exclamation-triangle"></i> ${e.message}</div>`;
  }
}

function _buildAnalysis(d) {
  const tabs = [
    {id:"overview",     icon:"fas fa-chart-pie",  label:"Overview"},
    {id:"tl_wise",      icon:"fas fa-user-tie",   label:"TL-wise"},
    {id:"partner_wise", icon:"fas fa-crown",       label:"Partner-wise"},
    {id:"pipeline",     icon:"fas fa-filter",      label:"Pipeline"},
    {id:"top5",         icon:"fas fa-trophy",      label:"Top Performers"},
    {id:"data",         icon:"fas fa-table",       label:"Data"},
  ];
  let html = `<div class="an-wrap"><div class="an-tabs" id="anTabs">`;
  tabs.forEach((t,i) => html += `<button class="an-tab${i===0?" active":""}" onclick="switchAnTab('${t.id}',this)"><i class="${t.icon}"></i><span>${t.label}</span></button>`);
  html += `</div>`;

  const pipe = d.pipeline||{};
  const total = (pipe.pending||0)+(pipe.tlApproved||0)+(pipe.tlRejected||0)+(pipe.pndApproved||0)+(pipe.pndRejected||0);
  const approvalRate   = total ? Math.round((pipe.pndApproved||0)/total*100) : 0;
  const rejectionRate  = total ? Math.round(((pipe.tlRejected||0)+(pipe.pndRejected||0))/total*100) : 0;
  const avgS = d.avgScores?.self??null, avgTL = d.avgScores?.tl??null, avgP = d.avgScores?.pnd??null;
  const tlLift  = (avgS!==null&&avgTL!==null) ? (avgTL-avgS).toFixed(2) : null;
  const pndLift = (avgTL!==null&&avgP!==null)  ? (avgP-avgTL).toFixed(2) : null;

  // ── OVERVIEW ──
  html += `<div class="an-section active" id="an_overview">`;
  html += `<div class="an-kpi-row">
    ${_kpi("Forms Submitted",total,"fas fa-file-alt","#667eea","Total KRAs submitted")}
    ${_kpi("Fully Approved",pipe.pndApproved||0,"fas fa-check-double","#27ae60","PnD approved")}
    ${_kpi("In Progress",(pipe.pending||0)+(pipe.tlApproved||0),"fas fa-hourglass-half","#f39c12","Awaiting review")}
    ${_kpi("Rejected",(pipe.tlRejected||0)+(pipe.pndRejected||0),"fas fa-times-circle","#e74c3c","TL or PnD rejected")}
    ${_kpi("Approval Rate",approvalRate+"%","fas fa-percent","#9b59b6","PnD approved / total")}
  </div>`;
  html += `<div class="an-two-col">
    <div class="an-card">
      <div class="an-card-title"><i class="fas fa-chart-line"></i> Score Progression (Company Average)</div>
      ${_scoreBar("Self Assessment",avgS,"#667eea")}
      ${_scoreBar("After TL Review",avgTL,"#27ae60")}
      ${_scoreBar("After PnD Final",avgP,"#e65100")}
      <div class="an-lift-row">
        ${tlLift!==null?`<span class="an-lift ${parseFloat(tlLift)>=0?"pos":"neg"}"><i class="fas fa-${parseFloat(tlLift)>=0?"arrow-up":"arrow-down"}"></i> TL adjustment: ${parseFloat(tlLift)>0?"+":""}${tlLift}%</span>`:""}
        ${pndLift!==null?`<span class="an-lift ${parseFloat(pndLift)>=0?"pos":"neg"}"><i class="fas fa-${parseFloat(pndLift)>=0?"arrow-up":"arrow-down"}"></i> PnD adjustment: ${parseFloat(pndLift)>0?"+":""}${pndLift}%</span>`:""}
      </div>
    </div>
    <div class="an-card"><div class="an-card-title"><i class="fas fa-lightbulb"></i> Key Insights</div>
      ${_overviewInsights(pipe,total,approvalRate,rejectionRate,tlLift,pndLift)}
    </div>
  </div>`;
  if (d.designationBreakdown && Object.keys(d.designationBreakdown).length) {
    const desigEntries = Object.entries(d.designationBreakdown).sort((a,b)=>b[1]-a[1]);
    const maxD = desigEntries[0][1];
    html += `<div class="an-card"><div class="an-card-hdr"><div class="an-card-title"><i class="fas fa-users"></i> Designation Breakdown</div><button class="an-export-btn" onclick="exportDesignation()"><i class="fas fa-file-excel"></i> Export</button></div><div class="an-desig-grid">`;
    desigEntries.forEach(([name,count]) => {
      html += `<div class="an-desig-item"><div class="an-desig-label">${name}</div><div class="an-desig-bar-wrap"><div class="an-desig-bar" style="width:${Math.round(count/maxD*100)}%;background:#667eea"></div></div><div class="an-desig-count">${count}</div></div>`;
    });
    html += `</div></div>`;
  }
  if (d.scoreVariance?.length) {
    html += `<div class="an-card"><div class="an-card-hdr"><div class="an-card-title"><i class="fas fa-exchange-alt"></i> Biggest Score Changes (Self → PnD)</div><button class="an-export-btn" onclick="exportVariance()"><i class="fas fa-file-excel"></i> Export</button></div>${_varianceTable(d.scoreVariance,"variance_tbl")}</div>`;
  }
  html += `</div>`;

  // ── TL-WISE ──
  html += `<div class="an-section" id="an_tl_wise">`;
  if (d.tlWise && Object.keys(d.tlWise).length) {
    const tlEntries = Object.entries(d.tlWise).filter(([k])=>k!=="Unknown").sort((a,b)=>b[1].total-a[1].total);
    const unknownTL = d.tlWise["Unknown"];
    html += `<div class="an-card"><div class="an-card-title"><i class="fas fa-lightbulb"></i> TL Insights</div>${_tlInsights(d.tlWise)}</div>`;
    html += `<div class="an-card"><div class="an-card-hdr"><div class="an-card-title"><i class="fas fa-user-tie"></i> TL Summary — click any number to see employees</div><button class="an-export-btn" onclick="exportTLSummary()"><i class="fas fa-file-excel"></i> Export</button></div>`;
    html += `<div class="an-table-wrap"><table class="an-table" id="tl_summary_tbl"><thead><tr>
      <th>Code</th><th>TL Name</th>
      <th class="an-num">Total</th><th class="an-num">Pending</th><th class="an-num">TL Approved</th>
      <th class="an-num">TL Rejected</th><th class="an-num">PnD Approved</th><th class="an-num">PnD Rejected</th>
      <th class="an-num">Avg Self%</th><th class="an-num">Avg PnD%</th>
    </tr></thead><tbody>`;
    const renderTLRow = (code,td,dim=false) => {
      const emps=td.employees||[];
      const selfPcts=emps.map(e=>e.selfPercentage).filter(v=>v!=null);
      const pndPcts=emps.map(e=>e.pndPercentage).filter(v=>v!=null);
      const avgSelf=selfPcts.length?(selfPcts.reduce((a,b)=>a+b,0)/selfPcts.length).toFixed(1):"—";
      const avgPnd=pndPcts.length?(pndPcts.reduce((a,b)=>a+b,0)/pndPcts.length).toFixed(1):"—";
      return `<tr ${dim?"style='background:#fafafa;color:#aaa'":''}><td><strong>${code}</strong></td><td>${td.name||code}</td>
        <td class="an-num"><span class="an-num-btn" onclick="openTLModal('${code}','all')">${td.total}</span></td>
        <td class="an-num"><span class="an-num-btn pending" onclick="openTLModal('${code}','submitted')">${td.pending||0}</span></td>
        <td class="an-num"><span class="an-num-btn approved" onclick="openTLModal('${code}','TL_approved')">${td.tlApproved||0}</span></td>
        <td class="an-num"><span class="an-num-btn rejected" onclick="openTLModal('${code}','TL_rejected')">${td.tlRejected||0}</span></td>
        <td class="an-num"><span class="an-num-btn pnd-approved" onclick="openTLModal('${code}','PnD_approved')">${td.approved||0}</span></td>
        <td class="an-num"><span class="an-num-btn pnd-rejected" onclick="openTLModal('${code}','PnD_rejected')">${td.rejected||0}</span></td>
        <td class="an-num">${avgSelf!=="—"?_pctPill(parseFloat(avgSelf)):"—"}</td>
        <td class="an-num">${avgPnd!=="—"?_pctPill(parseFloat(avgPnd)):"—"}</td>
      </tr>`;
    };
    tlEntries.forEach(([code,td])=>{ html+=renderTLRow(code,td); });
    if (unknownTL) html += renderTLRow("Unknown",unknownTL,true);
    html += `</tbody></table></div></div>`;
  } else html += `<div class="an-empty"><i class="fas fa-inbox"></i>No TL data yet</div>`;
  html += `</div>`;

  // ── PARTNER-WISE ──
  html += `<div class="an-section" id="an_partner_wise">`;
  if (d.pndWise && Object.keys(d.pndWise).length) {
    const pndEntries = Object.entries(d.pndWise).filter(([k])=>k!=="Unknown").sort((a,b)=>b[1].total-a[1].total);
    const unknownPnD = d.pndWise["Unknown"];
    html += `<div class="an-card"><div class="an-card-title"><i class="fas fa-lightbulb"></i> Partner Insights</div>${_partnerInsights(d)}</div>`;
    html += `<div class="an-card"><div class="an-card-hdr"><div class="an-card-title"><i class="fas fa-crown"></i> Partner Summary — click numbers to see employees</div><button class="an-export-btn" onclick="exportPartnerSummary()"><i class="fas fa-file-excel"></i> Export</button></div>`;
    html += `<div class="an-table-wrap"><table class="an-table" id="partner_summary_tbl"><thead><tr>
      <th>Code</th><th>Partner Name</th><th class="an-num">Total</th>
      <th class="an-num">Pending PnD</th><th class="an-num">PnD Approved</th>
      <th class="an-num">Completion%</th><th class="an-num">Avg Self%</th><th class="an-num">Avg TL%</th><th class="an-num">Avg PnD%</th>
    </tr></thead><tbody>`;
    const renderPndRow = (code,pd,dim=false) => {
      const top5d=d.top5ByPartner?.[code];
      const compRate=pd.total?Math.round((pd.pndApproved||0)/pd.total*100):0;
      return `<tr ${dim?"style='background:#fafafa;color:#aaa'":''}><td><strong>${code}</strong></td><td>${pd.name||code}</td>
        <td class="an-num">${pd.total}</td>
        <td class="an-num"><span class="an-num-btn pending" onclick="openPartnerModal('${code}','TL_approved')">${pd.tlApproved||0}</span></td>
        <td class="an-num"><span class="an-num-btn pnd-approved" onclick="openPartnerModal('${code}','PnD_approved')">${pd.pndApproved||0}</span></td>
        <td class="an-num"><div class="an-mini-bar-wrap"><div class="an-mini-bar" style="width:${Math.min(compRate,100)}%"></div><span>${compRate}%</span></div></td>
        <td class="an-num">${top5d?.avgSelf!=null?_pctPill(top5d.avgSelf):"—"}</td>
        <td class="an-num">${top5d?.avgTL  !=null?_pctPill(top5d.avgTL)  :"—"}</td>
        <td class="an-num">${top5d?.avgPnd !=null?_pctPill(top5d.avgPnd) :"—"}</td>
      </tr>`;
    };
    pndEntries.forEach(([code,pd])=>{ html+=renderPndRow(code,pd); });
    if (unknownPnD) html += renderPndRow("Unknown",unknownPnD,true);
    html += `</tbody></table></div></div>`;
  } else html += `<div class="an-empty"><i class="fas fa-inbox"></i>No partner data yet</div>`;
  html += `</div>`;

  // ── PIPELINE ──
  html += `<div class="an-section" id="an_pipeline">`;
  html += `<div class="an-kpi-row">
    ${_kpi("Submitted (Pending TL)",pipe.pending||0,"fas fa-paper-plane","#3498db","Awaiting TL action")}
    ${_kpi("TL Approved",pipe.tlApproved||0,"fas fa-user-check","#27ae60","Awaiting PnD action")}
    ${_kpi("TL Rejected",pipe.tlRejected||0,"fas fa-user-times","#e74c3c","Rejected by TL")}
    ${_kpi("PnD Approved",pipe.pndApproved||0,"fas fa-check-double","#9b59b6","Fully approved")}
    ${_kpi("PnD Rejected",pipe.pndRejected||0,"fas fa-ban","#e67e22","Rejected by PnD")}
  </div>`;
  html += `<div class="an-two-col">
    <div class="an-card"><div class="an-card-title"><i class="fas fa-filter"></i> Approval Funnel</div>${_funnel(pipe,total)}</div>
    <div class="an-card"><div class="an-card-title"><i class="fas fa-lightbulb"></i> Pipeline Insights</div>${_pipelineInsights(pipe,total,d.tlWise,d.pndWise)}</div>
  </div>`;
  html += `</div>`;

  // ── TOP PERFORMERS ──
  html += `<div class="an-section" id="an_top5">`;
  html += `<div class="an-card"><div class="an-card-hdr"><div class="an-card-title"><i class="fas fa-trophy"></i> Overall Top 5 Performers</div><button class="an-export-btn" onclick="exportTop5('overall')"><i class="fas fa-file-excel"></i> Export</button></div>${_top5Table(d.top5Overall,"top5_overall")}</div>`;
  if (d.top5ByPartner) {
    Object.entries(d.top5ByPartner).filter(([k])=>k!=="Unknown").forEach(([pk,pd]) => {
      const safePk = pk.replace(/\W/g,"_");

  // ── Drill-down modal ──
  html += `<div class="an-modal-overlay" id="anModal" onclick="if(event.target===this)closeAnModal()">

}

// ── UI helpers ────────────────────────────────────────────────────────────────
function _kpi(label,value,icon,color,sub){return `<div class="an-kpi" style="border-top:4px solid ${color}"><div class="an-kpi-icon" style="background:${color}22;color:${color}"><i class="${icon}"></i></div><div class="an-kpi-body"><div class="an-kpi-val">${value}</div><div class="an-kpi-label">${label}</div><div class="an-kpi-sub">${sub}</div></div></div>`;}
function _scoreBar(label,pct,color){const v=typeof pct==="number"?Math.min(pct,100):0;return `<div class="an-score-bar-wrap"><div class="an-score-bar-label"><span>${label}</span><strong>${pct!=null?pct+"%":"—"}</strong></div><div class="an-score-track"><div class="an-score-fill" style="width:${v}%;background:${color}"></div></div></div>`;}
function _funnel(pipe,total){const max=(pipe.pending||0)+(pipe.tlApproved||0)+(pipe.tlRejected||0)+(pipe.pndApproved||0)+(pipe.pndRejected||0)||1;const steps=[{l:"Submitted",v:max,c:"#3498db"},{l:"TL Reviewed",v:(pipe.tlApproved||0)+(pipe.pndApproved||0)+(pipe.pndRejected||0),c:"#27ae60"},{l:"PnD Approved",v:pipe.pndApproved||0,c:"#9b59b6"}];return `<div class="an-funnel">`+steps.map(s=>`<div class="an-funnel-step"><div class="an-funnel-bar" style="width:${Math.round(s.v/max*100)}%;background:${s.c}22;border-left:4px solid ${s.c}"><span style="color:${s.c};font-weight:700">${s.v}</span><span style="color:#888;font-size:.8rem">${s.l}</span></div></div>`).join("")+`</div>`;}
function _top5Table(rows,tableId){if(!rows?.length)return `<div class="an-empty" style="padding:1rem"><i class="fas fa-inbox"></i> No data</div>`;const medals=["🥇","🥈","🥉"];let html=`<div class="an-table-wrap"><table class="an-table" id="${tableId}"><thead><tr><th>#</th><th>Employee</th><th>Designation</th><th class="an-num">Self %</th><th class="an-num">TL %</th><th class="an-num">PnD %</th></tr></thead><tbody>`;rows.forEach((r,i)=>{html+=`<tr><td>${medals[i]||i+1}</td><td><strong>${r.employeeName||"—"}</strong><br><small style="color:#aaa">${r.employeeId}</small></td><td><small>${r.designation||"—"}</small></td><td class="an-num">${_pctPill(r.selfPct)}</td><td class="an-num">${_pctPill(r.tlPct)}</td><td class="an-num">${_pctPill(r.pndPct)}</td></tr>`;});return html+`</tbody></table></div>`;}
function _varianceTable(rows,tableId){const display=rows.slice(0,10);let html=`<div class="an-table-wrap"><table class="an-table" id="${tableId}"><thead><tr><th>#</th><th>Employee</th><th class="an-num">Self %</th><th class="an-num">PnD %</th><th class="an-num">Change</th></tr></thead><tbody>`;display.forEach((r,i)=>{const pos=r.delta>=0;html+=`<tr><td>${i+1}</td><td><strong>${r.employeeName}</strong><br><small style="color:#aaa">${r.employeeId}</small></td><td class="an-num">${_pctPill(r.selfPct)}</td><td class="an-num">${_pctPill(r.pndPct)}</td><td class="an-num" style="font-weight:700;color:${pos?"#27ae60":"#e74c3c"}">${pos?"+":""}${r.delta}%</td></tr>`;});return html+`</tbody></table></div>`;}

// ── Insights ──────────────────────────────────────────────────────────────────
function _ins(icon,color,text){return `<div class="an-insight"><i class="${icon}" style="color:${color}"></i><span>${text}</span></div>`;}
function _overviewInsights(pipe,total,approvalRate,rejectionRate,tlLift,pndLift){
  const ins=[];
  if(approvalRate>=70)ins.push(_ins("fas fa-thumbs-up","#27ae60",`Strong approval rate of <strong>${approvalRate}%</strong> — most employees are progressing well.`));
  else if(approvalRate<40)ins.push(_ins("fas fa-exclamation-triangle","#e74c3c",`Low approval rate of <strong>${approvalRate}%</strong> — review bottlenecks in TL/PnD stages.`));
  if(rejectionRate>15)ins.push(_ins("fas fa-times-circle","#e74c3c",`Rejection rate of <strong>${rejectionRate}%</strong> is high. Consider coaching before next cycle.`));
  if(tlLift!==null){const l=parseFloat(tlLift);if(l>5)ins.push(_ins("fas fa-arrow-up","#27ae60",`TLs boosting scores by avg <strong>+${l}%</strong> over self-assessment.`));else if(l<-5)ins.push(_ins("fas fa-arrow-down","#e74c3c",`TLs deflating scores by avg <strong>${l}%</strong> — employees may be over-rating.`));else ins.push(_ins("fas fa-check-circle","#3498db",`TL adjustments are well-calibrated (avg <strong>${l}%</strong>).`));}
  if(pndLift!==null){const l=parseFloat(pndLift);if(l>5)ins.push(_ins("fas fa-crown","#9b59b6",`PnD further uplifts scores by avg <strong>+${l}%</strong> over TL ratings.`));if(l<-5)ins.push(_ins("fas fa-crown","#e67e22",`PnD reduces scores by avg <strong>${l}%</strong> — stricter final review.`));}
  if((pipe.tlApproved||0)>20)ins.push(_ins("fas fa-hourglass-half","#f39c12",`<strong>${pipe.tlApproved}</strong> TL-approved records are awaiting PnD review — PnD backlog needs attention.`));
  if(!ins.length)ins.push(_ins("fas fa-info-circle","#667eea","Submit more appraisals to generate insights."));
  return ins.join("");
}
function _tlInsights(tlWise){
  const entries=Object.entries(tlWise).filter(([k])=>k!=="Unknown");
  if(!entries.length)return _ins("fas fa-info-circle","#667eea","No TL data available.");
  const ins=[];
  const byApproval=[...entries].sort((a,b)=>(b[1].approved||0)-(a[1].approved||0));
  if(byApproval[0])ins.push(_ins("fas fa-rocket","#27ae60",`<strong>${byApproval[0][1].name}</strong> leads with highest PnD-approved count (<strong>${byApproval[0][1].approved}</strong>).`));
  const byPending=[...entries].sort((a,b)=>(b[1].pending||0)-(a[1].pending||0));
  if((byPending[0]?.[1].pending||0)>3)ins.push(_ins("fas fa-clock","#f39c12",`<strong>${byPending[0][1].name}</strong> has the most unreviewed submissions (<strong>${byPending[0][1].pending}</strong>). Action recommended.`));
  const byRej=[...entries].sort((a,b)=>(b[1].tlRejected||0)-(a[1].tlRejected||0));
  if((byRej[0]?.[1].tlRejected||0)>0)ins.push(_ins("fas fa-times-circle","#e74c3c",`<strong>${byRej[0][1].name}</strong> has the highest rejection count (<strong>${byRej[0][1].tlRejected}</strong>) — may indicate misaligned expectations.`));
  const withAvg=entries.map(([c,td])=>{const p=(td.employees||[]).map(e=>e.pndPercentage).filter(v=>v!=null);return{name:td.name||c,avg:p.length?p.reduce((a,b)=>a+b,0)/p.length:null};}).filter(e=>e.avg!==null).sort((a,b)=>b.avg-a.avg);
  if(withAvg[0])ins.push(_ins("fas fa-star","#f39c12",`Highest avg PnD score is under <strong>${withAvg[0].name}</strong>'s team at <strong>${withAvg[0].avg.toFixed(1)}%</strong>.`));
  return ins.join("");
}
function _partnerInsights(d){
  const entries=Object.entries(d.pndWise||{}).filter(([k])=>k!=="Unknown");
  if(!entries.length)return _ins("fas fa-info-circle","#667eea","No partner data available.");
  const ins=[];
  const byApproval=[...entries].sort((a,b)=>(b[1].pndApproved||0)-(a[1].pndApproved||0));
  if(byApproval[0])ins.push(_ins("fas fa-crown","#27ae60",`<strong>${byApproval[0][1].name}</strong> has approved the most KRAs (<strong>${byApproval[0][1].pndApproved}</strong>).`));
  const byBacklog=[...entries].sort((a,b)=>(b[1].tlApproved||0)-(a[1].tlApproved||0));
  if((byBacklog[0]?.[1].tlApproved||0)>5)ins.push(_ins("fas fa-hourglass-half","#f39c12",`<strong>${byBacklog[0][1].name}</strong> has <strong>${byBacklog[0][1].tlApproved}</strong> records pending their review.`));
  entries.forEach(([code,pd])=>{const rate=pd.total?Math.round((pd.pndApproved||0)/pd.total*100):0;if(rate<30&&pd.total>5)ins.push(_ins("fas fa-exclamation-triangle","#e74c3c",`<strong>${pd.name}</strong> has low completion rate of <strong>${rate}%</strong> (${pd.pndApproved}/${pd.total}).`));});
  if(d.top5ByPartner){const withAvg=Object.entries(d.top5ByPartner).filter(([k])=>k!=="Unknown"&&d.top5ByPartner[k].avgPnd!=null).sort((a,b)=>b[1].avgPnd-a[1].avgPnd);if(withAvg[0])ins.push(_ins("fas fa-medal","#9b59b6",`Highest avg PnD score under <strong>${withAvg[0][1].partnerName}</strong> at <strong>${withAvg[0][1].avgPnd}%</strong>.`));}
  if(!ins.length)ins.push(_ins("fas fa-info-circle","#667eea","All partners are processing appraisals."));
  return ins.join("");
}
function _pipelineInsights(pipe,total,tlWise,pndWise){
  const ins=[];
  const compRate=total?Math.round((pipe.pndApproved||0)/total*100):0;
  ins.push(_ins("fas fa-chart-pie","#667eea",`Pipeline completion: <strong>${compRate}%</strong> of all submissions are fully approved.`));
  if((pipe.tlApproved||0)>15)ins.push(_ins("fas fa-hourglass-half","#f39c12",`<strong>${pipe.tlApproved}</strong> records are stuck at TL-approved — PnD is the current bottleneck.`));
  if((pipe.pending||0)>15)ins.push(_ins("fas fa-clock","#e74c3c",`<strong>${pipe.pending}</strong> records haven't been actioned by TLs yet.`));
  if((pipe.tlRejected||0)>5)ins.push(_ins("fas fa-redo","#e67e22",`<strong>${pipe.tlRejected}</strong> TL-rejected records may need resubmission.`));
  if(tlWise){const top=[...Object.entries(tlWise)].filter(([k])=>k!=="Unknown").sort((a,b)=>(b[1].pending||0)-(a[1].pending||0))[0];if(top&&(top[1].pending||0)>3)ins.push(_ins("fas fa-user-clock","#f39c12",`TL <strong>${top[1].name}</strong> has the most pending reviews (<strong>${top[1].pending}</strong>).`));}
  return ins.join("");
}

function switchAnTab(id, el) {

// ── Data tab ──────────────────────────────────────────────────────────────────
let _dataFilterTL  = "";
let _dataFilterPnD = "";

function _buildDataRows(){
  if(!_analysisData?.tlWise)return[];
  const rows=[];
  // Build a pndName lookup from pndWise employees list (now backend sends employees per partner)
  const pndLookup = {};
  Object.values(_analysisData.pndWise||{}).forEach(pd=>{
    (pd.employees||[]).forEach(e=>{ pndLookup[e.employeeId] = pd.name||"—"; });
  });
  Object.values(_analysisData.tlWise).forEach(td=>{
    (td.employees||[]).forEach(e=>{
      // Use pndName from employee record (now set by backend), then pndWise lookup, then top5 fallback
      const pndName = e.pndName && e.pndName!=="—" ? e.pndName
        : pndLookup[e.employeeId]
        || (() => { for(const[pk,pd]of Object.entries(_analysisData.top5ByPartner||{})){if((pd.top5||[]).some(r=>r.employeeId===e.employeeId))return pd.partnerName||pk;} return "—"; })();
      rows.push({
        empId:   e.employeeId,
        empName: e.employeeName||"—",
        tlName:  td.name||"—",
        pndName: pndName||"—",
        selfPct: e.selfPercentage,
        tlPct:   e.tlPercentage,
        pndPct:  e.pndPercentage,
        status:  e.status,
      });
    });
  });
  return rows;
}

function _buildFilterOptions(){
  const rows = window._dataRows || [];
  const tls  = [...new Set(rows.map(r=>r.tlName).filter(v=>v&&v!=="—"))].sort();
  const pnds = [...new Set(rows.map(r=>r.pndName).filter(v=>v&&v!=="—"))].sort();
  return {tls, pnds};
}

function onDataSearch(val){_dataSearchQuery=val.trim().toLowerCase();_dataCurrentPage=1;_renderDataTable();}
function onDataFilterTL(val){_dataFilterTL=val;_dataCurrentPage=1;_renderDataTable();}
function onDataFilterPnD(val){_dataFilterPnD=val;_dataCurrentPage=1;_renderDataTable();}

function _renderDataTable(){
  const wrap=document.getElementById("dataTableWrap");if(!wrap)return;

  // Populate filter dropdowns once
  const tlSel  = document.getElementById("dataTLFilter");
  const pndSel = document.getElementById("dataPnDFilter");
  if(tlSel && tlSel.dataset.built!=="1"){
    const {tls,pnds}=_buildFilterOptions();
    tls.forEach(t=>{const o=document.createElement("option");o.value=t;o.textContent=t;tlSel.appendChild(o);});
    pnds.forEach(p=>{const o=document.createElement("option");o.value=p;o.textContent=p;pndSel.appendChild(o);});
    tlSel.dataset.built="1";
  }

  const rows=(window._dataRows||[]).filter(r=>{
    if(_dataFilterTL  && r.tlName  !== _dataFilterTL)  return false;
    if(_dataFilterPnD && r.pndName !== _dataFilterPnD) return false;
    if(!_dataSearchQuery)return true;
    return r.empId.toLowerCase().includes(_dataSearchQuery)||
           r.empName.toLowerCase().includes(_dataSearchQuery)||
           r.tlName.toLowerCase().includes(_dataSearchQuery)||
           r.pndName.toLowerCase().includes(_dataSearchQuery);
  });

  document.getElementById("dataResultCount").textContent=`${rows.length} record${rows.length!==1?"s":""}`;
  const totalPages=Math.max(1,Math.ceil(rows.length/DATA_PAGE_SIZE));
  _dataCurrentPage=Math.min(_dataCurrentPage,totalPages);
  const pageRows=rows.slice((_dataCurrentPage-1)*DATA_PAGE_SIZE,_dataCurrentPage*DATA_PAGE_SIZE);

  let html=`<div class="an-table-wrap"><table class="an-table"><thead><tr>
    <th>Code</th><th>Employee Name</th><th>TL Name</th><th>PnD Name</th>
    <th class="an-num">Self %</th><th class="an-num">TL %</th><th class="an-num">PnD %</th><th>Status</th>
  </tr></thead><tbody>`;
  if(!pageRows.length){
    html+=`<tr><td colspan="8" style="text-align:center;padding:2rem;color:#aaa">No records found</td></tr>`;
  } else {
    pageRows.forEach(r=>{
      html+=`<tr>
        <td><strong>${r.empId}</strong></td>
        <td><span class="an-emp-link" onclick="openKRAModal('${r.empId}')">${r.empName}</span></td>
        <td>${r.tlName}</td>
        <td>${r.pndName}</td>

        <td class="an-num">${_pctPill(r.tlPct)}</td>
        <td class="an-num">${_pctPill(r.pndPct)}</td>
        <td><span class="an-status-chip an-status-${(r.status||"").replace(/_/g,"-").toLowerCase()}">${_statusLabel(r.status)}</span></td>
      </tr>`;
    });
  }
  html+=`</tbody></table></div>`+_pagination(totalPages,_dataCurrentPage,"dataGoPage");
  wrap.innerHTML=html;
}
function dataGoPage(page){_dataCurrentPage=page;_renderDataTable();}

// ── Pagination ────────────────────────────────────────────────────────────────
function _pagination(totalPages,current,fn){
  if(totalPages<=1)return"";
  let html=`<div class="an-pagination"><button class="an-pg-btn" ${current===1?"disabled":""} onclick="${fn}(${current-1})"><i class="fas fa-chevron-left"></i></button>`;
  for(let i=1;i<=totalPages;i++){if(i===1||i===totalPages||Math.abs(i-current)<=1){html+=`<button class="an-pg-btn${i===current?" active":""}" onclick="${fn}(${i})">${i}</button>`;}else if(Math.abs(i-current)===2){html+=`<span class="an-pg-ellipsis">…</span>`;}}
  return html+`<button class="an-pg-btn" ${current===totalPages?"disabled":""} onclick="${fn}(${current+1})"><i class="fas fa-chevron-right"></i></button></div>`;
}

// ── KRA detail modal (click employee name) ────────────────────────────────────
async function openKRAModal(empId){
  showLoading("Loading KRA…");
  try {
    const r = await fetch(`${API}/appraisal/analysis/kra/${empId}`,{headers:H()});
    const d = await r.json();
    if(!d.success) throw new Error(d.detail||"Not found");
    const rec = d.data;
    const qs  = rec.questions||{};
    const allQ= [...(qs.common||[]),...(qs.role||[])];
    const selfA=rec.answers||{}, tlA=rec.tl_responses||{}, pndA=rec.pnd_responses||{};

    const selfPct = rec.selfPercentage??rec.percentage;
    let html = `<div style="margin-bottom:1rem;font-size:.85rem;color:#555">
      <strong>${rec.employeeName}</strong> &nbsp;·&nbsp; ${rec.designation||"—"} &nbsp;·&nbsp;
      <span style="color:#888">TL: ${rec.reportingEmpName||rec.reportingManager||"—"}</span> &nbsp;·&nbsp;
      <span style="color:#888">PnD: ${rec.partnerEmpName||rec.partner||"—"}</span>
    </div>`;
    html+=`<div class="score-compare-strip">
      <span><i class="fas fa-user" style="color:#667eea"></i> <strong>Self:</strong> ${selfPct??"—"}%</span>
      ${rec.tlPercentage!=null?`<span><i class="fas fa-user-tie" style="color:#27ae60"></i> <strong>TL:</strong> ${rec.tlPercentage}%</span>`:""}
      ${rec.pndPercentage!=null?`<span><i class="fas fa-crown" style="color:#e65100"></i> <strong>PnD:</strong> ${rec.pndPercentage}%</span>`:""}
      <span style="margin-left:auto"><span class="an-status-chip an-status-${(rec.status||"").replace(/_/g,"-").toLowerCase()}">${_statusLabel(rec.status)}</span></span>
    </div>`;

    // Group questions by section
    const sections={};
    allQ.forEach(q=>{const s=q.section||"General";if(!sections[s])sections[s]=[];sections[s].push(q);});

    Object.entries(sections).forEach(([sec,qs])=>{
      html+=`<div class="q-section-hdr">${sec}</div>`;
      qs.forEach(q=>{
        const sv=selfA[q.id], tv=tlA[q.id], pv=pndA[q.id];
        const dispVal=(v)=>{if(v==null||v==="")return"—";return q.type==="rating"?`${v}/5 ★`:String(v);};
        html+=`<div class="q-card">
          <div class="q-label">${q.question}</div>
          <div class="q-hint">${q.response_hint||""}</div>
          <div class="q-response">
            <span class="q-self-val">👤 Self: ${dispVal(sv)}</span>
            ${tv!=null?`<span class="q-tl-val">🏷 TL: ${dispVal(tv)}</span>`:""}
            ${pv!=null?`<span class="q-pnd-val">👑 PnD: ${dispVal(pv)}</span>`:""}
          </div>
        </div>`;
      });
    });

    // Use the existing KRA review modal (kraModal) for this
    document.getElementById("modalTitle").textContent=`${rec.employeeName||empId} — KRA (${rec.period})`;
    document.getElementById("modalBody").innerHTML=html;
    document.getElementById("modalFooter").innerHTML=`<button onclick="closeModal()" style="padding:.5rem 1.2rem;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fff">Close</button>`;
    document.getElementById("kraModal").classList.add("open");
  } catch(e){showPopup(e.message,true);}
  finally{hideLoading();}
}

// ── Export ────────────────────────────────────────────────────────────────────
function _tableToCSV(tableId){const tbl=document.getElementById(tableId);if(!tbl)return"";return[...tbl.querySelectorAll("tr")].map(r=>[...r.querySelectorAll("th,td")].map(c=>`"${c.innerText.replace(/"/g,'""').replace(/\n/g,' ')}"`).join(",")).join("\n");}
function _dl(csv,name){const b=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;a.click();}
function exportTLSummary(){_dl(_tableToCSV("tl_summary_tbl"),"tl_summary.csv");}
function exportPartnerSummary(){_dl(_tableToCSV("partner_summary_tbl"),"partner_summary.csv");}
function exportTop5(key){_dl(_tableToCSV("top5_"+key),"top5_"+key+".csv");}
function exportVariance(){_dl(_tableToCSV("variance_tbl"),"score_variance.csv");}
function exportDesignation(){const data=_analysisData?.designationBreakdown||{};_dl("Designation,Count\n"+Object.entries(data).map(([d,c])=>`"${d}",${c}`).join("\n"),"designation.csv");}
function exportModalData(){_dl("Code,Name,Self%,TL%,PnD%,Status\n"+_modalRows.map(r=>`"${r.employeeId||r.empId}","${r.employeeName||r.empName||""}",${r.selfPercentage??r.selfPct??""},${r.tlPercentage??r.tlPct??""},${r.pndPercentage??r.pndPct??""},"${r.status||""}"`).join("\n"),"modal_export.csv");}
function exportDataTable(){
  const rows=(window._dataRows||[]).filter(r=>{
    if(_dataFilterTL&&r.tlName!==_dataFilterTL)return false;
    if(_dataFilterPnD&&r.pndName!==_dataFilterPnD)return false;
    if(!_dataSearchQuery)return true;
    return r.empId.toLowerCase().includes(_dataSearchQuery)||r.empName.toLowerCase().includes(_dataSearchQuery);
  });
  _dl("Code,Name,TL Name,PnD Name,Self%,TL%,PnD%,Status\n"+rows.map(r=>`"${r.empId}","${r.empName}","${r.tlName}","${r.pndName}",${r.selfPct||""},${r.tlPct||""},${r.pndPct||""},"${r.status||""}"`).join("\n"),"kra_data_export.csv");
}

document.getElementById("kraModal").addEventListener("click", function(e) { if(e.target===this) closeModal(); });
</script>
